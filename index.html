<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 추첨기</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --background-color: #f0f2f5;
            --card-background: #ffffff;
            --text-color: #333333;
            --ball-yellow: #fbc400;
            --ball-blue: #69c8f2;
            --ball-red: #ff7272;
            --ball-gray: #aaaaaa;
            --ball-green: #b0d840;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-background);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: var(--primary-color);
        }

        .lotto-balls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 2rem;
            min-height: 60px; /* 공이 없을 때도 공간 유지 */
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            /* 애니메이션 */
            opacity: 0;
            transform: scale(0.5);
            animation: popIn 0.5s forwards;
        }

        /* 공 색상 클래스 */
        .ball.yellow { background-color: var(--ball-yellow); }
        .ball.blue { background-color: var(--ball-blue); }
        .ball.red { background-color: var(--ball-red); }
        .ball.gray { background-color: var(--ball-gray); }
        .ball.green { background-color: var(--ball-green); }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: var(--shadow);
        }

        button:hover {
            background-color: #357abd;
        }

        button:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍀 행운의 로또 번호 🍀</h1>
    <div class="lotto-balls" id="result">
        <!-- 추첨된 공들이 여기에 표시됩니다 -->
        <div style="color: #aaa; padding-top: 15px;">버튼을 눌러 번호를 확인하세요!</div>
    </div>
    <button id="drawBtn">번호 추첨하기</button>
    <div class="footer">행운을 빕니다!</div>
</div>

<script>
    const resultDiv = document.getElementById('result');
    const drawBtn = document.getElementById('drawBtn');

    // 로또 번호 생성 함수
    function generateLottoNumbers() {
        const numbers = [];
        while (numbers.length < 6) {
            const num = Math.floor(Math.random() * 45) + 1;
            if (!numbers.includes(num)) {
                numbers.push(num);
            }
        }
        // 오름차순 정렬
        return numbers.sort((a, b) => a - b);
    }

    // 색상 클래스 반환 함수
    function getColorClass(num) {
        if (num <= 10) return 'yellow';
        if (num <= 20) return 'blue';
        if (num <= 30) return 'red';
        if (num <= 40) return 'gray';
        return 'green';
    }

    // 버튼 클릭 이벤트
    drawBtn.addEventListener('click', () => {
        const winningNumbers = generateLottoNumbers();
        
        // 결과 영역 초기화
        resultDiv.innerHTML = '';

        // 공 하나씩 생성 (약간의 시간차를 두고)
        winningNumbers.forEach((num, index) => {
            setTimeout(() => {
                const ball = document.createElement('div');
                ball.classList.add('ball', getColorClass(num));
                ball.textContent = num;
                resultDiv.appendChild(ball);
            }, index * 200); // 0.2초 간격으로 등장
        });
    });
</script>

</body>
</html>
