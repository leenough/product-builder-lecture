<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만다라트 계획표 - 목표 달성의 첫걸음</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>반석 위에 세운 집(시127)</h1>
        <p>인생의 8가지 수레바퀴를 통해 삶의 우선순위를 정해보세요.</p>
    </header>

    <section class="status-bar">
        <div class="current-time" id="currentTime">
            <!-- JS에서 현재 시간이 표시됩니다 -->
        </div>
        <div class="deadline-setter">
            <label for="deadlineDate">🎯 목표 데드라인:</label>
            <input type="date" id="deadlineDate">
        </div>
    </section>

    <main class="mandalart-container" id="mandalart">
        <!-- JS에서 9x9 그리드를 생성합니다 -->
    </main>

    <div class="divider"></div>

    <section class="verses-section">
        <h2>📖 핵심 목표별 성경 구절</h2>
        <div class="verses-grid" id="versesGrid">
            <!-- JS에서 9개의 성경구절 입력 칸을 생성합니다 -->
        </div>
    </section>

    <section class="example-section">
        <h2>✨ 나의 비전 예시</h2>
        <div class="mandalart-container example-mandalart" id="myVisionMandalart">
            <!-- JS에서 나의 비전 데이터를 채웁니다 -->
        </div>
    </section>

    <section class="example-section">
        <h2>💡 오타니 쇼헤이의 예시</h2>
        <div class="mandalart-container example-mandalart" id="exampleMandalart">
            <!-- JS에서 예시 데이터를 채웁니다 -->
        </div>
    </section>

    <footer class="footer">
        <p>모든 데이터는 브라우저에 자동으로 저장됩니다.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
